name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/izmar1234/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          if [ "${{ inputs.service }}" = "cartservice" ]; then
            docker build \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -t $IMAGE_NAME \
              -f ./src/cartservice/src/Dockerfile \
              ./src/cartservice/src
          else
            docker build \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              -t $IMAGE_NAME \
              ./src/${{ inputs.service }}
          fi

      #- name: Run Trivy Scan
        #uses: aquasecurity/trivy-action@0.20.0
        #with:
          #scan-type: image
          #image-ref: ${{ env.IMAGE_NAME }}
          #severity: HIGH,CRITICAL
          #exit-code: 0
          #vuln-type: os,library

      - name: Push Image
        run: |
          docker push $IMAGE_NAME
